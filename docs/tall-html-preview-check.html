<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tall HTML Preview Check</title>
    <style>
      :root {
        color: #172033;
        background: #f6f8fb;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
      }
      main {
        min-height: 2400px;
        padding: 48px;
        background:
          linear-gradient(#e2e8f0 1px, transparent 1px),
          linear-gradient(90deg, #e2e8f0 1px, transparent 1px),
          linear-gradient(180deg, #ffffff 0%, #eef4ff 100%);
        background-size:
          100% 180px,
          180px 100%,
          100% 100%;
      }
      section {
        max-width: 900px;
        margin: 0 auto 520px;
        padding: 32px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1,
      h2 {
        margin: 0 0 12px;
      }
      p {
        margin: 0;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Tall HTML Preview Check</h1>
        <p>HTML preview の iframe 高さ確認用ファイルです。</p>
      </section>
      <section>
        <h2>Middle</h2>
        <p>ページ内スクロールが必要な高さを意図的に持たせています。</p>
      </section>
      <section>
        <h2>Bottom</h2>
        <p>ここが見えるまでスクロールできれば、縦長 HTML の確認に使えます。</p>
      </section>
    </main>
  </body>
</html>
